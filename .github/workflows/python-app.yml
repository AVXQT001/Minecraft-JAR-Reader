name: Python CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install 3.12

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          # xvfb is the "Virtual Display" needed to run GUI code on a server
          sudo apt-get install -y \
            libegl1 libopengl0 libxcb-cursor0 libxkbcommon-x11-0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 \
            libxcb-xinerama0 libxcb-xinput0 libxcb-xfixes0 xvfb
          
          uv pip install --system pyqt6 nuitka

      - name: Check Syntax (Dry Run)
        run: |
          # This checks if the code has errors without opening a window
          uv run python -m py_compile main.py

      - name: Build Executable (Nuitka)
        run: |
          # Using Nuitka to build the Linux version to ensure it compiles
          uv run python -m nuitka \
            --standalone \
            --enable-plugin=pyqt6 \
            --include-qt-plugins=sensible \
            --output-dir=dist \
            main.py

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MC-JAR-Reader-Linux
          path: dist/*.dist/
